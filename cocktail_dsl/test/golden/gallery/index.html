<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Glass Gallery</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #ccc; font-family: system-ui, sans-serif; padding: 24px; }
  h1 { text-align: center; margin-bottom: 24px; font-size: 18px; color: #888; text-transform: uppercase; letter-spacing: 2px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; max-width: 1400px; margin: 0 auto; }
  .card { background: #16213e; border-radius: 8px; padding: 8px; text-align: center; }
  .card img { width: 100%%; aspect-ratio: 400/360; }
  .card .label { font-size: 12px; color: #aaa; margin-top: 4px; }
</style>
</head>
<body>
<h1>Glass Gallery (33)</h1>
<div class="grid">
  <div class="card"><img src="highball.svg"><div class="label">Highball</div></div>
  <div class="card"><img src="zombie.svg"><div class="label">Zombie</div></div>
  <div class="card"><img src="collins.svg"><div class="label">Collins</div></div>
  <div class="card"><img src="weizenbier.svg"><div class="label">Weizenbier</div></div>
  <div class="card"><img src="pilsner.svg"><div class="label">Pilsner</div></div>
  <div class="card"><img src="pint.svg"><div class="label">Pint</div></div>
  <div class="card"><img src="sling.svg"><div class="label">Sling</div></div>
  <div class="card"><img src="pokal.svg"><div class="label">Pokal</div></div>
  <div class="card"><img src="old-fashioned.svg"><div class="label">Old Fashioned</div></div>
  <div class="card"><img src="rocks.svg"><div class="label">Rocks</div></div>
  <div class="card"><img src="tumbler.svg"><div class="label">Tumbler</div></div>
  <div class="card"><img src="nick-nora.svg"><div class="label">Nick & Nora</div></div>
  <div class="card"><img src="martini.svg"><div class="label">Martini</div></div>
  <div class="card"><img src="margarita.svg"><div class="label">Margarita</div></div>
  <div class="card"><img src="hurricane.svg"><div class="label">Hurricane</div></div>
  <div class="card"><img src="poco-grande.svg"><div class="label">Poco Grande</div></div>
  <div class="card"><img src="sour.svg"><div class="label">Sour</div></div>
  <div class="card"><img src="milkshake.svg"><div class="label">Milkshake</div></div>
  <div class="card"><img src="red-wine.svg"><div class="label">Red Wine</div></div>
  <div class="card"><img src="white-wine.svg"><div class="label">White Wine</div></div>
  <div class="card"><img src="rose-wine.svg"><div class="label">Rose Wine</div></div>

</body>
</html>
